<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVL All Care - MIP Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden flex">

    <div id="sidebarBackdrop" class="fixed inset-0 bg-slate-900/50 z-30 hidden transition-opacity lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-blue-900 text-white transform -translate-x-full transition-transform duration-300 lg:relative lg:translate-x-0 shadow-xl flex flex-col">
        <div class="h-16 flex items-center justify-between px-6 border-b border-blue-800">
            <h1 class="text-xl font-bold text-white"><i class="fa-solid fa-hospital-user mr-2 text-yellow-400"></i>JVL All Care</h1>
            <button id="closeSidebarBtn" class="lg:hidden text-blue-200 hover:text-white">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto no-scrollbar" id="navMenu">
            <a href="#" data-target="dashboard" class="nav-item flex items-center px-4 py-3 rounded-lg text-white hover:bg-blue-800 transition">
                <i class="fa-solid fa-chart-pie w-6 text-green-400"></i> หน้าหลัก (Dashboard)
            </a>
            <a href="#" data-target="register" class="nav-item flex items-center px-4 py-3 rounded-lg text-white hover:bg-blue-800 transition">
                <i class="fa-solid fa-user-plus w-6 text-yellow-400"></i> ลงทะเบียนผู้ป่วย
            </a>
            <a href="#" data-target="er_screening" class="nav-item flex items-center px-4 py-3 rounded-lg text-white hover:bg-blue-800 transition">
                <i class="fa-solid fa-truck-medical w-6 text-red-400"></i> คัดกรอง ER (OAS)
            </a>
        </nav>
        
        <div class="p-4 border-t border-blue-800">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-white text-blue-900 flex items-center justify-center font-bold">AD</div>
                <div class="text-sm">
                    <p class="font-semibold text-white">ผู้ดูแลระบบ</p>
                    <p class="text-blue-300 text-xs">JVL Hospital</p>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative w-full">
        <header class="h-16 bg-white shadow-sm border-b border-slate-200 flex items-center justify-between px-4 lg:px-8 z-20">
            <div class="flex items-center">
                <button id="openSidebarBtn" class="lg:hidden text-slate-500 hover:text-blue-600 focus:outline-none mr-4">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <h2 id="pageTitle" class="text-xl font-bold text-blue-900">หน้าหลัก</h2>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-slate-400 hover:text-yellow-500 transition"><i class="fa-solid fa-bell text-lg"></i></button>
            </div>
        </header>

        <main id="appContent" class="flex-1 overflow-y-auto p-4 lg:p-8">
            </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
