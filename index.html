<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVL All Care - MIP Management System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden relative">

    <!-- ฉากหลังสีเทาดำเวลาเปิดเมนูในมือถือ (Backdrop) -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-30 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar (Off-canvas บนมือถือ) -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-blue-900 text-white flex flex-col transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0">
        <div class="h-16 flex items-center justify-between px-4 border-b border-blue-800">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-hospital-user mr-2"></i>JVL All Care</h1>
            <!-- ปุ่มปิดเมนูบนมือถือ -->
            <button onclick="toggleSidebar()" class="md:hidden text-blue-300 hover:text-white">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" onclick="loadView('dashboard')" id="nav-dashboard" class="nav-item block px-4 py-2 rounded bg-blue-800 hover:bg-blue-700 transition">
                <i class="fa-solid fa-chart-line w-6"></i> Dashboard
            </a>
            <a href="#" onclick="loadView('register')" id="nav-register" class="nav-item block px-4 py-2 rounded hover:bg-blue-700 transition">
                <i class="fa-solid fa-user-plus w-6"></i> ลงทะเบียนผู้ป่วย
            </a>
            <a href="#" onclick="loadView('er_screening')" id="nav-er_screening" class="nav-item block px-4 py-2 rounded hover:bg-blue-700 transition">
                <i class="fa-solid fa-truck-medical w-6"></i> คัดกรอง ER (OAS)
            </a>
        </nav>
        <div class="p-4 text-xs text-blue-300 text-center border-t border-blue-800">
            v1.0 Prototype
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full">
        <!-- Top Navbar -->
        <header class="h-16 bg-white shadow flex items-center justify-between px-4 md:px-6 z-20">
            <div class="flex items-center">
                <!-- ปุ่ม Hamburger สำหรับมือถือ -->
                <button onclick="toggleSidebar()" class="text-gray-600 hover:text-blue-600 focus:outline-none md:hidden mr-4">
                    <i class="fa-solid fa-bars text-2xl"></i>
                </button>
                <h2 id="page-title" class="text-xl font-semibold text-gray-800 truncate">Dashboard</h2>
            </div>
            <div class="flex items-center space-x-2 md:space-x-3">
                <span class="text-sm text-gray-600 hidden sm:block">ผู้ใช้งาน: Admin</span>
                <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center shadow">
                    <i class="fa-solid fa-user text-sm"></i>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Container -->
        <div id="app-content" class="p-4 md:p-6 w-full max-w-full">
            <!-- เนื้อหาจะถูกแทรกที่นี่โดย JavaScript -->
        </div>
    </main>

    <!-- เรียกใช้ไฟล์ JavaScript -->
    <script src="app.js"></script>
</body>
</html>
